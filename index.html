<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>传讯</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="companion.css">
<link rel="stylesheet" href="pet-style.css">
<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="shop.css">
<link rel="stylesheet" href="diary.css">
<link rel="stylesheet" href="moments.css">
<link rel="stylesheet" href="map.css">
<link rel="stylesheet" href="spark.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>
<!-- 初始引导弹窗 -->
<div id="splash-declaration">
    <div class="splash-bg">
        <div id="splash-stars"></div>
        <div class="splash-container">
            <div class="splash-slides"></div>
            <div id="splash-dots"></div>
            <div class="splash-input-wrap">
                <input id="splash-pledge-input" placeholder="完整输入承诺文字">
                <div class="splash-pledge-hint" id="splash-pledge-hint"></div>
            </div>
            <div class="splash-buttons">
                <button id="splash-prev-btn"><i class="fa fa-angle-left"></i></button>
                <button id="splash-next-btn"><i class="fa fa-angle-right"></i></button>
                <button id="splash-enter-btn" class="ready">进入空间</button>
            </div>
            <div class="splash-page-num" id="splash-page-num">1 / 7</div>
        </div>
    </div>
</div>
<!-- 新手教程遮罩 -->
<div id="tour-overlay">
    <div id="tour-highlight-box"></div>
    <div id="tour-popover">
        <h3 id="tour-title"></h3>
        <div id="tour-content"></div>
        <div class="tour-foot">
            <span id="tour-step-counter"></span>
            <div class="tour-btns">
                <button id="tour-prev-btn">上一步</button>
                <button id="tour-skip-btn">跳过教程</button>
                <button id="tour-next-btn">下一步</button>
            </div>
        </div>
    </div>
</div>
<!-- 顶部头部 -->
<header class="app-header">
    <div class="user-info left">
        <div id="my-avatar" class="message-avatar">
            <img src="" alt="我的头像">
        </div>
        <div class="user-text">
            <div id="my-name"></div>
            <div id="my-status-container"></div>
        </div>
    </div>
    <div class="header-motto"></div>
    <div class="partner-info right">
        <div id="partner-name"></div>
        <div id="partner-avatar" class="message-avatar">
            <img src="" alt="对方头像">
        </div>
    </div>
    <div class="header-toolbar">
        <button id="theme-toggle" title="明暗切换"><i class="fa fa-moon-o"></i></button>
        <button id="settings-btn" title="设置"><i class="fa fa-cog"></i></button>
        <button id="favorites-btn" title="收藏消息"><i class="fa fa-star-o"></i></button>
        <button id="session-manager-btn" title="会话管理"><i class="fa fa-folder-o"></i></button>
    </div>
</header>

<!-- 干净聊天主容器（一号原版简约布局，无冗余模块） -->
<main class="chat-main">
    <div class="chat-box" id="chat-box">
        <!-- 对方输入提示 -->
        <div class="typing-indicator" id="typing-indicator">
            <div id="typing-indicator-avatar"></div>
            <span id="typing-indicator-label"></span>
        </div>
        <!-- 聊天消息渲染区域（自带去重渲染逻辑） -->
        <div id="message-list" class="message-list"></div>
    </div>
    <!-- 底部输入栏 简约一号样式 -->
    <div class="input-bar">
        <button id="attachment-btn" title="图片/表情包"><i class="fa fa-picture-o"></i></button>
        <button id="poke-btn" title="拍一拍"><i class="fa fa-hand-paper-o"></i></button>
        <button id="continue-btn" title="让对方继续发言"><i class="fa fa-comment-o"></i></button>
        <button id="batch-btn" title="批量发送"><i class="fa fa-list"></i></button>
        <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
        <button id="send-btn" class="send"><i class="fa fa-paper-plane"></i></button>
    </div>
</main>

<!-- 全部二号网站原有功能弹窗（完全保留不删除） -->
<!-- 设置弹窗、收藏、会话、宠物、小屋、商店、手账、通话、塔罗、衣柜、储物柜、繁育、任务等所有modal完整保留 -->
<div id="ti-settings-modal" class="modal">
    <div class="modal-inner">
        <h3>输入提示设置</h3>
        <div id="ti-avatar-toggle" class="toggle-row">显示头像</div>
        <input id="ti-text-input" placeholder="自定义对方输入文字">
        <div class="modal-btns">
            <button id="ti-text-save-btn">保存</button>
            <button id="ti-text-reset-btn">重置</button>
            <button id="ti-settings-close-btn">关闭</button>
        </div>
        <div class="ti-preview">
            <div id="ti-preview-avatar"></div>
            <span id="ti-preview-text"></span>
        </div>
    </div>
</div>
<div id="settings-modal" class="modal"></div>
<div id="fav-modal" class="modal"></div>
<div id="session-modal" class="modal"></div>
<div id="pet-modal" class="modal"></div>
<div id="activity-modal" class="modal"></div>
<div id="recall-modal" class="modal"></div>
<div id="locker-modal" class="modal"></div>
<div id="house-modal" class="modal"></div>
<div id="shop-modal" class="modal"></div>
<div id="wardrobe-modal" class="modal"></div>
<div id="diary-modal" class="modal"></div>
<div id="call-modal" class="modal"></div>
<div id="tarot-modal" class="modal">
</div>
<div class="task-modal" class="modal"></div>
<div id="achievement-modal" class="modal"></div>
<div id="theme-modal" class="modal"></div>
<div id="envelope-modal" class="modal"></div>
<div id="group-modal" class="modal"></div>
<div id="mood-modal" class="modal"></div>
<div id="gift-modal" class="modal">
</div>
<div class="pet-card-modal modal"></div>
<div class="achievement-popup"></div>
<!-- 剧情弹窗（宠物初始剧情） -->
<div id="story-screen" class="screen">
    <div id="story-box">
        <p id="story-text"></p>
        <small>点击屏幕继续</small>
    </div>
</div>
<div id="transition-screen" class="screen">
    <button id="showPetSelection">开启宠物小屋</button>
</div>
<div id="start-screen" class="screen pet-select">
    <div class="pet-container"></div>
    <button id="start-btn">确认领养</button>
</div>
<!-- 全局Toast提示 -->
<div id="toast" class="toast"></div>

<!-- 脚本加载顺序（聊天核心优先，二号全功能脚本完整保留） -->
<script src="utils.js"></script>
<script src="state.js"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="backup-engine.js"></script>
<script src="core.js"></script>
<script src="onboarding.js"></script>
<script src="listeners.js"></script>
<script src="listeners-step2.js"></script>
<script src="listeners-sticker.js"></script>
<script src="listeners-voice.js"></script>
<script src="reply-library.js"></script>
<script src="companion.js"></script>
<script src="companion-diary.js"></script>
<script src="envelope.js"></script>
<script src="group-chat.js"></script>
<script src="mood.js"></script>
<script src="theme-editor.js"></script>
<script src="call.js"></script>
<script src="ta-phone.js"></script>
<script src="tarot.js"></script>
<script src="pet-game.js"></script>
<script src="pet.js"></script>
<script src="shop.js"></script>
<script src="home.js"></script>
<script src="diary.js"></script>
<script src="moments.js"></script>
<script src="map.js"></script>
<script src="gift-cabinet.js"></script>
<script src="games.js"></script>
<script src="features.js"></script>
<script src="accounting.js"></script>
<script src="spark.js"></script>
<script src="red-packet.js"></script>
<script src="moyu.js"></script>
<script src="theme-editor.js"></script>
</body>
</html>
