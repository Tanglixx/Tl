<style>
/* ===== 新布局样式（完全独立，不依赖原有 CSS） ===== */
#app-root {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #f5f5f5;
    z-index: 1000;
    font-family: 'Noto Serif SC', -apple-system, sans-serif;
    color: #1a1a1a;
    overflow: hidden;
}

/* ===== 导航栏 ===== */
.app-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    flex-shrink: 0;
    min-height: 48px;
}
.app-nav .title {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
}
.app-nav .actions {
    display: flex;
    gap: 12px;
}
.app-nav .actions button {
    background: none;
    border: none;
    font-size: 20px;
    color: #888;
    cursor: pointer;
    padding: 4px 6px;
    transition: color 0.2s;
}
.app-nav .actions button:hover { color: #b8a9c9; }
.app-nav .actions button:active { transform: scale(0.92); }

/* ===== 内容区 ===== */
.app-content {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #f5f5f5;
}
.app-page {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 0 12px 12px;
    background: #f5f5f5;
}
.app-page.active { display: block; }

/* ===== 底部 Tab ===== */
.app-tab-bar {
    display: flex;
    background: #fff;
    border-top: 1px solid #e8e8e8;
    flex-shrink: 0;
    padding: 4px 0 env(safe-area-inset-bottom, 4px);
}
.app-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 6px 0;
    background: none;
    border: none;
    color: #888;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s;
}
.app-tab .icon { font-size: 22px; }
.app-tab .label { font-weight: 500; }
.app-tab.active { color: #b8a9c9; }
.app-tab:active { transform: scale(0.94); }

/* ===== 会话列表 ===== */
.chat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 10px;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 4px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.15s;
}
.chat-item:hover { background: #fafafa; }
.chat-item:active { transform: scale(0.98); }
.chat-item .avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #888;
    overflow: hidden;
    flex-shrink: 0;
}
.chat-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
.chat-item .info { flex: 1; min-width: 0; }
.chat-item .name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.chat-item .preview { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-item .time { font-size: 11px; color: #888; flex-shrink: 0; }
.chat-item .badge {
    background: #ff4757;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 0 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
}
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #888;
}
.empty-state i { font-size: 40px; opacity: 0.3; display: block; margin-bottom: 12px; }

/* ===== 通讯录 ===== */
.contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 10px;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 4px;
    border-bottom: 1px solid #f0f0f0;
}
.contact-item .avatar {

    height: 44px;
    border-radius: 50%;

    align-items: center;

.contact-item .desc { font-size: 12px; color: #888; }

    padding: 4px 6px;

/* ===== 发现 ===== */
.discover-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px 8px;
    padding: 12px 0;

.discover-item {

.discover-item:hover { border-color: #b8a9c9; }
.discover-item:active { transform: scale(0.94); }
.discover-item .icon {

    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;

    color: #b8a9c9;

/* ===== 设置 ===== */
.settings-group-title {

.settings-item {

.settings-item .label { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.settings-item .desc { font-size: 11px; color: #888; }
.settings-item .arrow { color: #888; font-size: 14px; opacity: 0.5; }

/* ===== 聊天视图（覆盖层） ===== */
.chat-view {
    position: absolute;

<!-- ============================================================
     布局接管脚本
     ============================================================ -->
<script>
(function() {
    'use strict';

    // ===== 1. 阻止原有主页显示 =====
    // 在 app.js 加载后覆盖 showHomePage
    const origShowHomePage = window.showHomePage;
    window.showHomePage = function() {
        console.log('[布局] 已拦截 showHomePage');
        // 不执行任何操作
    };

    // ===== 2. 隐藏原有元素 =====
    function hideOriginalElements() {
        document.querySelectorAll('.header, .main-chat-area, .input-area-wrapper, #home-container, #welcome-animation, .header-motto').forEach(el => {
            if (el) el.style.display = 'none';
        });
        // 但保留 chat-container 供复用
        const chatContainer = document.getElementById('chat-container');
        if (chatContainer) {
            chatContainer.style.display = 'flex';
            chatContainer.style.flex = '1';
            chatContainer.style.overflowY = 'auto';
            chatContainer.style.padding = '12px 14px';
            chatContainer.style.flexDirection = 'column';
            chatContainer.style.gap = '2px';
        }
        // 隐藏原有功能容器
        document.querySelectorAll('#shop-container, #pet-container, #ta-phone-container, #moments-container').forEach(el => {
            if (el) el.style.display = 'none';
        });
    }

    // ===== 3. 会话数据 =====
    let sessions = [];
    let currentSessionId = null;

    function loadSessions() {
        try {
            if (window.sessionList && window.sessionList.length) {
                sessions = window.sessionList.map(s => ({
                    id: s.id,
                    name: s.name || '会话',
                    partnerName: s.partnerName || '对方',
                    type: 'single',
                    createdAt: s.createdAt || Date.now(),
                    avatar: '',
                    lastMsg: '点击进入聊天',
                    unread: 0
                }));
            } else {
                const raw = localStorage.getItem('wc_sessions');
                if (raw) sessions = JSON.parse(raw);
            }
        } catch(e) {}
        if (!sessions || sessions.length === 0) {
            sessions = [{
                id: 'default_' + Date.now(),
                name: '梦角',
                partnerName: '梦角',
                type: 'single',
                createdAt: Date.now(),
                avatar: '',
                lastMsg: '你好呀~',
                unread: 0
            }];
        }
        saveSessions();
    }

    function saveSessions() {
        try { localStorage.setItem('wc_sessions', JSON.stringify(sessions)); } catch(e) {}
    }

    // ===== 4. 渲染函数 =====

    function renderChats() {
        const container = document.getElementById('chat-list');
        if (!container) return;
        if (!sessions || sessions.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-comment-dots"></i><p>暂无会话</p></div>';
            return;
        }
        container.innerHTML = sessions.map(s => {
            const avatar = s.avatar || '';
            const initial = (s.name || '?')[0];
            const unread = s.unread || 0;
            const time = new Date(s.createdAt || Date.now()).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
            return `
                <div class="chat-item" data-id="${s.id}">
                    <div class="avatar">${avatar ? `<img src="${avatar}">` : `<span>${initial}</span>`}</div>
                    <div class="info"><div class="name">${s.name}</div><div class="preview">${s.lastMsg || '开始聊天'}</div></div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                        <div class="time">${time}</div>
                        ${unread > 0 ? `<div class="badge">${unread}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
        // 绑定点击事件
        container.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', function() {
                openChat(this.dataset.id);
            });
        });
    }

    function renderContacts() {
        const container = document.getElementById('contact-list');
        if (!container) return;
        if (!sessions || sessions.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-address-book"></i><p>暂无联系人</p></div>';
            return;
        }
        container.innerHTML = sessions.map(s => {
            const avatar = s.avatar || '';
            const initial = (s.name || '?')[0];
            return `
                <div class="contact-item">
                    <div class="avatar">${avatar ? `<img src="${avatar}">` : `<span>${initial}</span>`}</div>
                    <div class="info"><div class="name">${s.name}</div><div class="desc">${s.type === 'group' ? '群聊' : '单人'} · ${s.partnerName || ''}</div></div>
                    <button class="edit-btn" onclick="editContact('${s.id}')"><i class="fas fa-pen"></i></button>
                </div>
            `;
        }).join('');
    }

    function renderDiscover() {
        const grid = document.getElementById('discover-grid');
        if (!grid) return;
        const items = [
            { id:'shop', icon:'fa-store', label:'商城', color:'#ff6b6b' },
            { id:'moyu', icon:'fa-fish', label:'摸鱼小记', color:'#4d96ff' },
            { id:'diary', icon:'fa-clipboard-list', label:'朝夕心记', color:'#6bcb77' },
            { id:'fortune', icon:'fa-star-and-crescent', label:'运势占卜', color:'#a29bfe' },
            { id:'mood', icon:'fa-calendar-day', label:'心晴手帐', color:'#fd79a8' },
            { id:'calendar', icon:'fa-calendar-alt', label:'日历', color:'#fdcb6e' },
            { id:'decide', icon:'fa-balance-scale', label:'抉择', color:'#e17055' },
            { id:'stats', icon:'fa-chart-bar', label:'消息统计', color:'#00b894' },
            { id:'accounting', icon:'fa-coins', label:'同心记账', color:'#f39c12' },
            { id:'pet', icon:'fa-paw', label:'萌宠屋', color:'#e84393' },
            { id:'taphone', icon:'fa-mobile-alt', label:'TA的手机', color:'#6c5ce7' },
            { id:'map', icon:'fa-map-marked-alt', label:'Zmilk地图', color:'#0984e3' },
            { id:'moments', icon:'fa-images', label:'朋友圈', color:'#00cec9' },
            { id:'gift', icon:'fa-gift', label:'礼物柜', color:'#fd79a8' },
        ];
        grid.innerHTML = items.map(item => `
            <div class="discover-item" data-id="${item.id}">
                <div class="icon" style="background:${item.color}22;color:${item.color};"><i class="fas ${item.icon}"></i></div>
                <div class="label">${item.label}</div>
            </div>
        `).join('');
        grid.querySelectorAll('.discover-item').forEach(el => {
            el.addEventListener('click', function() {
                openDiscover(this.dataset.id);
            });
        });
    }

    function renderSettings() {
        const container = document.getElementById('settings-list');
        if (!container) return;
        const groups = [
            { title:'通用', items:[
                { id:'theme', icon:'fa-palette', label:'主题配色', desc:'切换亮色/暗色' },
                { id:'chat', icon:'fa-sliders-h', label:'聊天设置', desc:'回复速度、气泡样式' },
                { id:'sound', icon:'fa-volume-up', label:'音效设置', desc:'消息提示音' },
            ]},
            { title:'数据', items:[
                { id:'data', icon:'fa-database', label:'数据管理', desc:'备份、导入、重置' },
                { id:'export', icon:'fa-file-export', label:'导出数据', desc:'导出聊天记录' },
            ]},
            { title:'关于', items:[
                { id:'disclaimer', icon:'fa-scroll', label:'声明与致谢', desc:'开源声明、致谢名单' },
                { id:'tutorial', icon:'fa-compass', label:'新手引导', desc:'重新播放教程' },
            ]}
        ];
        container.innerHTML = groups.map(g => `
            <div style="margin-bottom:16px;">
                <div class="settings-group-title">${g.title}</div>
                ${g.items.map(item => `
                    <div class="settings-item" data-id="${item.id}">
                        <div class="icon"><i class="fas ${item.icon}"></i></div>
                        <div class="info"><div class="label">${item.label}</div><div class="desc">${item.desc}</div></div>
                        <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                    </div>
                `).join('')}
            </div>
        `).join('');
        container.querySelectorAll('.settings-item').forEach(el => {
            el.addEventListener('click', function() {
                handleSettings(this.dataset.id);
            });
        });
    }

    // ===== 5. Tab 切换 =====
    function switchTab(tab) {
        document.querySelectorAll('.app-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
        const map = { chats:'page-chats', contacts:'page-contacts', discover:'page-discover', settings:'page-settings' };
        const page = document.getElementById(map[tab]);
        if (page) page.classList.add('active');
        const titleMap = { chats:'传讯', contacts:'通讯录', discover:'发现', settings:'设置' };
        document.getElementById('app-nav-title').textContent = titleMap[tab] || '传讯';
        // 关闭聊天视图
        document.getElementById('chat-view').classList.remove('active');
        // 刷新
        if (tab === 'chats') renderChats();
        if (tab === 'contacts') renderContacts();
        if (tab === 'discover') renderDiscover();
        if (tab === 'settings') renderSettings();
    }

    document.querySelectorAll('.app-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            switchTab(this.dataset.tab);
        });
    });

    // ===== 6. 打开聊天 =====
    function openChat(sessionId) {
        const session = sessions.find(s => s.id === sessionId);
        if (!session) return;
        currentSessionId = sessionId;
        session.unread = 0;
        saveSessions();
        renderChats();

        // 更新聊天视图头部
        const avatar = document.getElementById('chat-view-avatar');
        const name = document.getElementById('chat-view-name');
        const status = document.getElementById('chat-view-status');
        const initial = (session.name || '?')[0];
        avatar.innerHTML = session.avatar ? `<img src="${session.avatar}">` : `<span>${initial}</span>`;
        name.textContent = session.name;
        status.textContent = session.type === 'group' ? '群聊' : '在线';

        // 获取聊天视图主体
        const body = document.getElementById('chat-view-body');

        // 移动原有的 chat-container 到聊天视图
        const chatContainer = document.getElementById('chat-container');
        if (chatContainer) {
            // 先清空 body
            body.innerHTML = '';
            // 移动 chat-container
            body.appendChild(chatContainer);
            // 移动 input-area-wrapper
            const inputWrapper = document.getElementById('input-area-wrapper');
            if (inputWrapper) {
                body.appendChild(inputWrapper);
            }
            // 显示聊天视图
            document.getElementById('chat-view').classList.add('active');
            // 绑定 DOMElements
            if (window.DOMElements) {
                window.DOMElements.chatContainer = chatContainer;
            }
            // 渲染消息
            if (typeof window.renderMessages === 'function') {
                window.renderMessages(false);
            }
            // 滚动到底部
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
                const input = document.getElementById('message-input');
                if (input) input.focus();
            }, 200);
        } else {
            alert('聊天容器未找到，请刷新页面');
        }
    }

    // ===== 7. 返回 =====
    document.getElementById('chat-back-btn').addEventListener('click', function() {
        // 将 chat-container 移回原处
        const body = document.getElementById('chat-view-body');
        const chatContainer = document.getElementById('chat-container');
        const inputWrapper = document.getElementById('input-area-wrapper');
        if (chatContainer) {
            // 移回 original-elements
            const orig = document.getElementById('original-elements');
            if (orig) {
                // 但原处可能没有 main-chat-area，我们直接放到 body 的后面
                // 简单处理：保留在 body 中，但隐藏聊天视图
                document.getElementById('chat-view').classList.remove('active');
                // 确保 DOMElements 指向正确
                if (window.DOMElements) {
                    window.DOMElements.chatContainer = chatContainer;
                }
                // 切换到传讯页
                switchTab('chats');
            }
        }
    });

    // ===== 8. 新建会话 =====
    document.getElementById('app-add-btn').addEventListener('click', function() {
        const name = prompt('会话名称：');
        if (!name || !name.trim()) return;
        const partner = prompt('对方昵称：');
        if (!partner || !partner.trim()) return;
        const type = confirm('群聊？确定=群聊，取消=单人') ? 'group' : 'single';
        const newSession = {
            id: 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2,4),
            name: name.trim(),
            partnerName: partner.trim(),
            type: type,
            createdAt: Date.now(),
            avatar: '',
            lastMsg: '开始聊天吧~',
            unread: 0
        };
        sessions.push(newSession);
        saveSessions();
        renderChats();
        renderContacts();
        setTimeout(() => openChat(newSession.id), 200);
    });

    // ===== 9. 编辑联系人 =====
    window.editContact = function(id) {
        const session = sessions.find(s => s.id === id);
        if (!session) return;
        const newName = prompt('修改会话名称：', session.name);
        if (newName !== null && newName.trim()) {
            session.name = newName.trim();
            saveSessions();
            renderContacts();
            renderChats();
        }
        const newPartner = prompt('修改对方昵称：', session.partnerName || '');
        if (newPartner !== null) {
            session.partnerName = newPartner.trim() || '对方';
            saveSessions();
            renderContacts();
        }
        // 头像
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                session.avatar = ev.target.result;
                saveSessions();
                renderContacts();
                renderChats();
                // 如果当前聊天视图打开，更新头像
                const avatarEl = document.getElementById('chat-view-avatar');
                if (avatarEl && currentSessionId === id) {
                    avatarEl.innerHTML = `<img src="${session.avatar}">`;
                }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    // ===== 10. 发现功能 =====
    function openDiscover(id) {
        const map = {
            'shop': () => { if (window.ShopApp && window.ShopApp.showShop) window.ShopApp.showShop(); else alert('商城未加载'); },
            'moyu': () => { if (window.openMoyuModal) window.openMoyuModal(); else alert('摸鱼小记未加载'); },
            'diary': () => { if (window.openDiaryModal) window.openDiaryModal(); else alert('朝夕心记未加载'); },
            'fortune': () => { if (window.generateFortune) window.generateFortune(); else alert('运势占卜未加载'); },
            'mood': () => { const m=document.getElementById('mood-modal'); if(m && window.showModal) window.showModal(m); else alert('心晴手帐未加载'); },
            'calendar': () => { if (window.openMiniCalendar) window.openMiniCalendar(); else alert('日历未加载'); },
            'decide': () => { const m=document.getElementById('decision-menu-modal'); if(m && window.showModal) window.showModal(m); else alert('抉择未加载'); },
            'stats': () => { const m=document.getElementById('stats-modal'); if(m && window.showModal) window.showModal(m); else alert('消息统计未加载'); },
            'accounting': () => { if (window.openAccountingModal) window.openAccountingModal(); else alert('同心记账未加载'); },
            'pet': () => { if (window.showPetPage) window.showPetPage(); else alert('萌宠屋未加载'); },
            'taphone': () => { if (window.TaPhoneApp && window.TaPhoneApp.showTaPhone) window.TaPhoneApp.showTaPhone(); else alert('TA的手机未加载'); },
            'map': () => { if (window.MapApp && window.MapApp.show) window.MapApp.show(); else alert('Zmilk地图未加载'); },
            'moments': () => { if (window.showMomentsPage) window.showMomentsPage(); else alert('朋友圈未加载'); },
            'gift': () => { if (window.GiftCabinetApp && window.GiftCabinetApp.open) window.GiftCabinetApp.open(); else alert('礼物柜未加载'); },
        };
        if (map[id]) map[id]();
        else alert('功能不存在');
    }

    // ===== 11. 设置功能 =====
    function handleSettings(id) {
        const map = {
            'theme': () => { const m=document.getElementById('appearance-modal'); if(m && window.showModal) window.showModal(m); else alert('主题设置未加载'); },
            'chat': () => { const m=document.getElementById('chat-modal'); if(m && window.showModal) window.showModal(m); else alert('聊天设置未加载'); },
            'sound': () => { const m=document.getElementById('chat-modal'); if(m && window.showModal) { window.showModal(m); setTimeout(()=>{ document.querySelector('.cs-tab[data-panel="cs-panel-sound"]')?.click(); },100); } else alert('音效设置未加载'); },
            'data': () => { const m=document.getElementById('data-modal'); if(m && window.showModal) window.showModal(m); else alert('数据管理未加载'); },
            'export': () => { if (window.exportChatHistory) window.exportChatHistory(); else alert('导出功能未加载'); },
            'disclaimer': () => { const m=document.getElementById('disclaimer-modal'); if(m && window.showModal) window.showModal(m); else alert('声明未加载'); },
            'tutorial': () => { if (window.startTour) window.startTour(); else alert('新手引导未加载'); },
        };
        if (map[id]) map[id]();
        else alert('设置项未定义');
    }

    // ===== 12. 监听消息更新 =====
    const origAddMessage = window.addMessage;
    if (origAddMessage) {
        window.addMessage = function(msg) {
            origAddMessage(msg);
            if (msg.sender && msg.sender !== 'system' && currentSessionId) {
                const session = sessions.find(s => s.id === currentSessionId);
                if (session) {
                    session.lastMsg = msg.text || '[图片]';
                    session.unread = (session.unread || 0) + 1;
                    saveSessions();
                    renderChats();
                }
            }
        };
    }

    // ===== 13. 初始化 =====
    function init() {
        // 隐藏原有元素
        hideOriginalElements();

        // 加载数据
        loadSessions();

        // 渲染
        renderChats();
        renderContacts();
        renderDiscover();
        renderSettings();

        // 默认选中传讯
        switchTab('chats');

        // 将聊天容器初始放入聊天视图
        const chatContainer = document.getElementById('chat-container');
        const inputWrapper = document.getElementById('input-area-wrapper');
        const body = document.getElementById('chat-view-body');
        if (chatContainer && inputWrapper && body) {
            body.appendChild(chatContainer);
            body.appendChild(inputWrapper);
        }

        // 绑定 DOMElements
        if (window.DOMElements) {
            window.DOMElements.chatContainer = document.getElementById('chat-container');
        }

        console.log('[布局] 初始化完成！');
    }

    // 等待所有 JS 加载完成
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 300);
    } else {
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(init, 500);
        });
    }

    // 暴露全局
    window.switchTab = switchTab;
    window.openChat = openChat;
    window.renderChats = renderChats;
    window.renderContacts = renderContacts;
    window.renderDiscover = renderDiscover;
    window.renderSettings = renderSettings;
    window.sessions = sessions;
    window.saveSessions = saveSessions;

})();
</script>

</body>
</html>
