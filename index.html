<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-color-theme="black-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>传讯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="icon" type="image/png" sizes="192x192" href="https://file.youtochat.com/images/20260216/1771224856844_qdqqd.jpeg">
    <link rel="apple-touch-icon" href="https://file.youtochat.com/images/20260216/1771224856844_qdqqd.jpeg">
    <meta name="apple-mobile-web-app-title" content="传讯">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/diary.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/pet-style.css">
    <link rel="stylesheet" href="css/moments.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/spark.css">

    <style>
        /* ===== 微信式布局样式 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; font-family:var(--font-family,'Noto Serif SC',serif); background:var(--primary-bg); color:var(--text-primary); }
        ::-webkit-scrollbar { display:none; }
        * { scrollbar-width:none; -ms-overflow-style:none; }

        #app-root {
            display:flex;
            flex-direction:column;
            height:100vh;
            max-width:100vw;
            overflow:hidden;
            position:relative;
            background:var(--primary-bg);
        }

        .app-status-bar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:2px 16px 0;
            font-size:12px;
            color:var(--text-secondary);
            flex-shrink:0;
            background:var(--primary-bg);
            z-index:10;
            height:24px;
        }
        .app-status-bar .time { font-weight:600; }

        .app-nav {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:4px 16px 8px;
            flex-shrink:0;
            background:var(--primary-bg);
            border-bottom:1px solid var(--border-color);
            z-index:10;
            min-height:44px;
        }
        .app-nav .nav-title { font-size:18px; font-weight:700; color:var(--text-primary); }
        .app-nav .nav-actions { display:flex; gap:12px; align-items:center; }
        .app-nav .nav-actions button {
            background:none; border:none; color:var(--text-secondary);
            font-size:18px; cursor:pointer; padding:4px;
            transition:color 0.2s;
        }
        .app-nav .nav-actions button:hover { color:var(--accent-color); }
        .app-nav .nav-actions button:active { transform:scale(0.92); }

        .app-content {
            flex:1;
            overflow:hidden;
            position:relative;
            background:var(--primary-bg);
        }
        .app-page {
            display:none;
            position:absolute;
            top:0; left:0; right:0; bottom:0;
            overflow-y:auto;
            background:var(--primary-bg);
            padding:0 0 12px;
        }
        .app-page.active { display:block; }

        .app-tab-bar {
            display:flex;
            align-items:stretch;
            background:var(--secondary-bg);
            border-top:1px solid var(--border-color);
            flex-shrink:0;
            padding:2px 0 env(safe-area-inset-bottom,2px);
            z-index:20;
        }
        .app-tab {
            flex:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:1px;
            padding:4px 0;
            background:none;
            border:none;
            color:var(--text-secondary);
            font-size:10px;
            cursor:pointer;
            font-family:var(--font-family);
            transition:color 0.2s;
            -webkit-tap-highlight-color:transparent;
        }
        .app-tab:active { transform:scale(0.94); }
        .app-tab .tab-icon { font-size:22px; line-height:1; }
        .app-tab .tab-label { font-weight:500; letter-spacing:0.2px; }
        .app-tab.active { color:var(--accent-color); }

        .chat-list { padding:0 12px; }
        .chat-list-item {
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 10px;
            border-radius:12px;
            cursor:pointer;
            transition:background 0.15s;
            border-bottom:1px solid var(--border-color);
        }
        .chat-list-item:hover { background:rgba(var(--accent-color-rgb),0.05); }
        .chat-list-item:active { transform:scale(0.98); }
        .chat-list-item .cli-avatar {
            width:48px; height:48px;
            border-radius:50%;
            flex-shrink:0;
            background:var(--border-color);
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            color:var(--text-secondary);
        }
        .chat-list-item .cli-avatar img { width:100%; height:100%; object-fit:cover; }
        .chat-list-item .cli-info { flex:1; min-width:0; }
        .chat-list-item .cli-name { font-size:15px; font-weight:600; color:var(--text-primary); }
        .chat-list-item .cli-preview { font-size:13px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-list-item .cli-time { font-size:11px; color:var(--text-secondary); flex-shrink:0; align-self:flex-start; margin-top:4px; }
        .chat-list-item .cli-badge {
            min-width:18px; height:18px; padding:0 5px;
            background:#ff4757; color:#fff; font-size:10px; font-weight:700;
            border-radius:9px; display:flex; align-items:center; justify-content:center;
        }
        .chat-list-empty { text-align:center; padding:60px 20px; color:var(--text-secondary); font-size:14px; }
        .chat-list-empty i { font-size:40px; opacity:0.3; display:block; margin-bottom:12px; }

        .contact-list { padding:0 12px; }
        .contact-item {
            display:flex;
            align-items:center;
            gap:12px;
            padding:10px 10px;
            border-radius:12px;
            border-bottom:1px solid var(--border-color);
        }
        .contact-item .ci-avatar {
            width:44px; height:44px;
            border-radius:50%;
            flex-shrink:0;
            background:var(--border-color);
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:16px;
            color:var(--text-secondary);
        }
        .contact-item .ci-avatar img { width:100%; height:100%; object-fit:cover; }
        .contact-item .ci-info { flex:1; min-width:0; }
        .contact-item .ci-name { font-size:14px; font-weight:600; color:var(--text-primary); }
        .contact-item .ci-desc { font-size:12px; color:var(--text-secondary); }
        .contact-item .ci-edit {
            color:var(--text-secondary); font-size:14px; padding:6px;
            border-radius:8px; background:none; border:none; cursor:pointer;
        }
        .contact-item .ci-edit:hover { background:rgba(var(--accent-color-rgb),0.1); color:var(--accent-color); }
        .contact-empty { text-align:center; padding:60px 20px; color:var(--text-secondary); font-size:14px; }
        .contact-empty i { font-size:40px; opacity:0.3; display:block; margin-bottom:12px; }

        .discover-grid {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:16px 8px;
            padding:16px 12px;
        }
        .discover-item {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:6px;
            padding:12px 4px;
            border-radius:16px;
            cursor:pointer;
            transition:all 0.2s;
            background:var(--secondary-bg);
            border:1px solid var(--border-color);
        }
        .discover-item:active { transform:scale(0.94); }
        .discover-item:hover { border-color:var(--accent-color); }
        .discover-item .di-icon {
            font-size:26px;
            width:48px; height:48px;
            border-radius:14px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:rgba(var(--accent-color-rgb),0.08);
            color:var(--accent-color);
        }
        .discover-item .di-icon i { font-size:22px; }
        .discover-item .di-label { font-size:11px; color:var(--text-secondary); font-weight:500; text-align:center; }

        .settings-list { padding:8px 12px; }
        .settings-group { margin-bottom:20px; }
        .settings-group-title {
            font-size:12px; font-weight:600; color:var(--text-secondary);
            text-transform:uppercase; letter-spacing:0.5px; padding:8px 4px 6px;
        }
        .settings-item-row {
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 14px;
            border-radius:12px;
            background:var(--secondary-bg);
            border:1px solid var(--border-color);
            cursor:pointer;
            transition:all 0.2s;
            margin-bottom:6px;
        }
        .settings-item-row:hover { border-color:var(--accent-color); }
        .settings-item-row:active { transform:scale(0.98); }
        .settings-item-row .si-icon {
            font-size:18px;
            width:36px; height:36px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:rgba(var(--accent-color-rgb),0.08);
            color:var(--accent-color);
            flex-shrink:0;
        }
        .settings-item-row .si-info { flex:1; min-width:0; }
        .settings-item-row .si-label { font-size:14px; font-weight:500; color:var(--text-primary); }
        .settings-item-row .si-desc { font-size:11px; color:var(--text-secondary); }
        .settings-item-row .si-arrow { color:var(--text-secondary); font-size:14px; opacity:0.5; }

        /* 聊天覆盖层 */
        .chat-view-overlay {
            position:absolute;
            top:0; left:0; right:0; bottom:0;
            z-index:50;
            background:var(--primary-bg);
            display:none;
            flex-direction:column;
        }
        .chat-view-overlay.active { display:flex; }

        .chat-view-header {
            display:flex;
            align-items:center;
            padding:6px 12px 8px;
            flex-shrink:0;
            background:var(--secondary-bg);
            border-bottom:1px solid var(--border-color);
            gap:6px;
            min-height:48px;
        }
        .chat-view-header .back-btn {
            background:none; border:none;
            color:var(--text-secondary); font-size:18px;
            cursor:pointer; padding:4px 6px;
        }
        .chat-view-header .back-btn:hover { color:var(--accent-color); }
        .chat-view-header .cvh-center {
            flex:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:1px;
            margin-right:32px;
        }
        .chat-view-header .cvh-avatar {
            width:36px; height:36px;
            border-radius:50%;
            overflow:hidden;
            background:var(--border-color);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:14px;
            color:var(--text-secondary);
        }
        .chat-view-header .cvh-avatar img { width:100%; height:100%; object-fit:cover; }
        .chat-view-header .cvh-name { font-size:15px; font-weight:600; color:var(--text-primary); }
        .chat-view-header .cvh-status { font-size:11px; color:var(--text-secondary); }

        .chat-view-body {
            flex:1;
            overflow:hidden;
            position:relative;
            display:flex;
            flex-direction:column;
        }
        .chat-view-body .chat-container {
            flex:1;
            overflow-y:auto;
            padding:12px 14px;
            display:flex;
            flex-direction:column;
            gap:2px;
            background:transparent;
        }
        .chat-view-body .input-area-wrapper {
            position:relative;
            flex-shrink:0;
            background:var(--input-area-bg);
            border-top:1px solid var(--border-color);
            padding-bottom:env(safe-area-inset-bottom,0);
        }
        .chat-view-body .input-area-wrapper .input-area {
            padding:8px 12px;
        }

        .new-chat-overlay {
            position:fixed;
            inset:0;
            z-index:99999;
            background:rgba(0,0,0,0.5);
            backdrop-filter:blur(6px);
            display:none;
            align-items:center;
            justify-content:center;
        }
        .new-chat-overlay.active { display:flex; }
        .new-chat-panel {
            background:var(--secondary-bg);
            border-radius:20px;
            padding:24px;
            width:88%;
            max-width:340px;
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
        }
        .new-chat-panel .ncp-title { font-size:16px; font-weight:700; text-align:center; margin-bottom:16px; color:var(--text-primary); }
        .new-chat-panel .ncp-field { margin-bottom:14px; }
        .new-chat-panel .ncp-field label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
        .new-chat-panel .ncp-field input,
        .new-chat-panel .ncp-field select {
            width:100%; padding:10px 14px;
            border:1.5px solid var(--border-color);
            border-radius:10px;
            font-size:14px;
            background:var(--primary-bg);
            color:var(--text-primary);
            outline:none;
            font-family:var(--font-family);
            box-sizing:border-box;
        }
        .new-chat-panel .ncp-field input:focus,
        .new-chat-panel .ncp-field select:focus { border-color:var(--accent-color); }
        .new-chat-panel .ncp-actions { display:flex; gap:10px; margin-top:6px; }
        .new-chat-panel .ncp-actions button {
            flex:1; padding:11px; border-radius:12px; border:none;
            font-size:14px; font-weight:600; cursor:pointer;
            font-family:var(--font-family);
        }
        .new-chat-panel .ncp-actions .ncp-cancel { background:var(--primary-bg); color:var(--text-secondary); border:1px solid var(--border-color); }
        .new-chat-panel .ncp-actions .ncp-confirm { background:var(--accent-color); color:#fff; }

        @media (max-width:480px) {
            .discover-grid { grid-template-columns:repeat(4,1fr); gap:10px 6px; }
            .discover-item .di-icon { width:42px; height:42px; font-size:20px; }
            .discover-item .di-icon i { font-size:18px; }
        }
        @media (max-width:380px) {
            .discover-grid { grid-template-columns:repeat(3,1fr); }
        }
    </style>
</head>
<body>

<div id="app-root">
    <div class="app-status-bar">
        <span class="time" id="status-time">09:41</span>
        <span><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-three-quarters"></i></span>
    </div>

    <div class="app-nav" id="app-nav">
        <span class="nav-title" id="nav-title">传讯</span>
        <div class="nav-actions">
            <button id="nav-add-btn" title="新建会话"><i class="fas fa-plus-circle"></i></button>
        </div>
    </div>

    <div class="app-content">
        <div class="app-page active" id="page-chats">
            <div class="chat-list" id="chat-list-container"></div>
        </div>

        <div class="app-page" id="page-contacts">
            <div class="contact-list" id="contact-list-container"></div>
        </div>

        <div class="app-page" id="page-discover">
            <div class="discover-grid" id="discover-grid"></div>
        </div>

        <div class="app-page" id="page-settings">
            <div class="settings-list" id="settings-list-container"></div>
        </div>

        <!-- 聊天覆盖层 -->
        <div class="chat-view-overlay" id="chat-view-overlay">
            <div class="chat-view-header">
                <button class="back-btn" id="chat-view-back"><i class="fas fa-arrow-left"></i></button>
                <div class="cvh-center">
                    <div class="cvh-avatar" id="cvh-avatar"><i class="fas fa-user"></i></div>
                    <div class="cvh-name" id="cvh-name">对方</div>
                    <div class="cvh-status" id="cvh-status">在线</div>
                </div>
                <div style="width:32px;"></div>
            </div>
            <div class="chat-view-body" id="chat-view-body">
                <!-- 完全复用原有聊天结构 -->
                <div class="main-chat-area" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;padding-bottom:0;">
                    <div class="chat-container" id="chat-container" style="flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:2px;background:transparent;"></div>
                    <div id="empty-state" style="display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;pointer-events:none;z-index:1;">
                        <i class="fas fa-heart" style="font-size:52px;opacity:0.55;color:var(--accent-color);"></i>
                        <p style="font-size:15px;font-weight:600;color:var(--accent-color);opacity:0.9;">✦ 我们的故事，始于此刻 ✦</p>
                    </div>
                    <div id="typing-indicator-wrapper" style="display:none;position:absolute;bottom:70px;left:16px;z-index:49;background:transparent;">
                        <div class="typing-indicator" style="display:inline-flex;align-items:center;gap:9px;background:rgba(var(--secondary-bg-rgb),0.92);backdrop-filter:blur(28px);border:1px solid rgba(var(--accent-color-rgb),0.22);padding:8px 16px 8px 8px;border-radius:26px;">
                            <div class="typing-indicator-avatar" id="typing-indicator-avatar" style="width:30px;height:30px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(var(--accent-color-rgb),0.15);"><i class="fas fa-user" style="font-size:12px;color:var(--accent-color);"></i></div>
                            <span class="typing-indicator-label" id="typing-indicator-label" style="font-size:11.5px;font-weight:600;color:var(--accent-color);">对方 正在输入</span>
                            <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
                        </div>
                    </div>
                    <!-- 输入区域 -->
                    <div class="input-area-wrapper" id="input-area-wrapper" style="flex-shrink:0;background:var(--input-area-bg);border-top:1px solid var(--border-color);padding-bottom:env(safe-area-inset-bottom,0);">
                        <div id="reply-preview-container" style="padding:0 12px;"></div>
                        <div id="batch-preview" style="display:none;padding:0 12px;"></div>
                        <div id="collapsed-extras-panel" style="display:none;padding:8px 12px;background:var(--secondary-bg);border-top:1px solid var(--border-color);">
                            <div class="wx-extras-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
                                <div class="wx-extra-item" onclick="document.getElementById('image-input').click()"><div class="wx-extra-icon"><i class="fas fa-image"></i></div><div class="wx-extra-label">相册</div></div>
                                <div class="wx-extra-item" onclick="document.getElementById('combo-btn').click()"><div class="wx-extra-icon"><i class="fas fa-laugh-beam"></i></div><div class="wx-extra-label">表情</div></div>
                                <div class="wx-extra-item" onclick="document.getElementById('continue-btn').click()"><div class="wx-extra-icon"><i class="fas fa-ellipsis-h"></i></div><div class="wx-extra-label">继续说</div></div>
                                <div class="wx-extra-item" onclick="window.showRedPacketSendModal && window.showRedPacketSendModal()"><div class="wx-extra-icon"><i class="fas fa-envelope"></i></div><div class="wx-extra-label">红包</div></div>
                                <div class="wx-extra-item" onclick="(function(){var m=document.getElementById('custom-replies-modal');if(m&&typeof showModal==='function')showModal(m);})()"><div class="wx-extra-icon"><i class="fas fa-comment-dots"></i></div><div class="wx-extra-label">字卡</div></div>
                                <div class="wx-extra-item" onclick="window.generateFortune && window.generateFortune()"><div class="wx-extra-icon"><i class="fas fa-star-and-crescent"></i></div><div class="wx-extra-label">占卜</div></div>
                                <div class="wx-extra-item" onclick="if(window.callFeature&&typeof window.callFeature.startCall==='function')window.callFeature.startCall(false)"><div class="wx-extra-icon"><i class="fas fa-video"></i></div><div class="wx-extra-label">通话</div></div>
                                <div class="wx-extra-item" onclick="window.exitCollapseMode && window.exitCollapseMode()"><div class="wx-extra-icon" style="background:rgba(255,80,80,0.08);color:#e74c3c;"><i class="fas fa-times"></i></div><div class="wx-extra-label">退出</div></div>
                            </div>
                        </div>
                        <div class="input-area" style="display:flex;padding:8px 12px;gap:8px;align-items:flex-end;border-top:1px solid var(--border-color);">
                            <button id="collapse-expand-btn" style="display:none;width:36px;height:36px;border:none;border-radius:50%;cursor:pointer;background:rgba(var(--accent-color-rgb),0.12);color:var(--accent-color);font-size:14px;flex-shrink:0;align-items:center;justify-content:center;" onclick="window.toggleCollapsedExtras && window.toggleCollapsedExtras()"><i class="fas fa-chevron-up"></i></button>
                            <button class="attachment-btn input-btn collapse-hideable" id="attachment-btn" title="发送图片"><i class="fas fa-image"></i></button>
                            <button class="combo-btn input-btn collapse-hideable" id="combo-btn" title="表情 & 拍一拍"><i class="fas fa-laugh-beam"></i></button>
                            <button class="red-packet-btn input-btn collapse-hideable" id="red-packet-btn" title="发红包" onclick="window.showRedPacketSendModal && window.showRedPacketSendModal()">
                                <svg width="20" height="24" viewBox="0 0 20 28" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="16" height="18" rx="2"/><path d="M2 8l8 6 8-6"/><circle cx="10" cy="14" r="2" fill="currentColor" stroke="none"/></svg>
                            </button>

<!-- ===== 布局接管 + 功能补丁 ===== -->
<script>
(function() {
    'use strict';

    // ===== 1. 阻止原 app.js 显示主页 =====
    // 在 app.js 执行后覆盖 showHomePage
    const origShowHomePage = window.showHomePage;
    window.showHomePage = function() {
        console.log('[布局] showHomePage 被拦截，使用新布局');
        // 不执行原来的显示逻辑
    };
    // 如果 home-container 被显示了，隐藏它
    document.addEventListener('DOMContentLoaded', function() {
        const home = document.getElementById('home-container');
        if (home) home.style.display = 'none';
        document.body.classList.remove('home-active');
    });

    // ===== 2. 会话管理 =====
    let chatSessions = [];
    let currentChatId = null;

    function loadSessions() {
        try {
            const raw = localStorage.getItem('wechat_sessions');
            if (raw) chatSessions = JSON.parse(raw);
        } catch(e) { chatSessions = []; }
        if (chatSessions.length === 0) {
            let defaultName = '梦角';
            try {
                if (typeof settings !== 'undefined' && settings.partnerName) {
                    defaultName = settings.partnerName;
                }
            } catch(e) {}
            chatSessions.push({
                id: 'default_' + Date.now(),
                name: defaultName,
                partnerName: defaultName,
                type: 'single',
                createdAt: Date.now(),
                avatar: '',
                lastMsg: '你好呀~',
                unread: 0
            });
            saveSessions();
        }
    }
    function saveSessions() {
        try { localStorage.setItem('wechat_sessions', JSON.stringify(chatSessions)); } catch(e) {}
    }

    function renderChatList() {
        const container = document.getElementById('chat-list-container');
        if (!container) return;
        if (chatSessions.length === 0) {
            container.innerHTML = '<div class="chat-list-empty"><i class="fas fa-comment-dots"></i><p>暂无会话</p><span style="font-size:12px;opacity:0.6;">点击右上角 + 创建</span></div>';
            return;
        }
        const sorted = [...chatSessions].sort((a,b) => b.createdAt - a.createdAt);
        container.innerHTML = sorted.map(s => {
            const avatar = s.avatar || '';
            const initial = (s.name || '?')[0];
            const unread = s.unread || 0;
            const lastMsg = s.lastMsg || '开始聊天~';
            const time = new Date(s.createdAt).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
            return `
                <div class="chat-list-item" data-id="${s.id}" onclick="window.openChatSession('${s.id}')">
                    <div class="cli-avatar">${avatar ? `<img src="${avatar}">` : `<span>${initial}</span>`}</div>
                    <div class="cli-info"><div class="cli-name">${s.name}</div><div class="cli-preview">${lastMsg}</div></div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                        <div class="cli-time">${time}</div>
                        ${unread > 0 ? `<div class="cli-badge">${unread > 99 ? '99+' : unread}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderContacts() {
        const container = document.getElementById('contact-list-container');
        if (!container) return;
        if (chatSessions.length === 0) {
            container.innerHTML = '<div class="contact-empty"><i class="fas fa-address-book"></i><p>通讯录为空</p></div>';
            return;
        }
        container.innerHTML = chatSessions.map(s => {
            const avatar = s.avatar || '';
            const initial = (s.name || '?')[0];
            return `
                <div class="contact-item">
                    <div class="ci-avatar">${avatar ? `<img src="${avatar}">` : `<span>${initial}</span>`}</div>
                    <div class="ci-info"><div class="ci-name">${s.name}</div><div class="ci-desc">${s.type === 'group' ? '群聊' : '单人'} · ${s.partnerName || ''}</div></div>
                    <button class="ci-edit" onclick="window.editContact('${s.id}')"><i class="fas fa-pen"></i></button>
                </div>
            `;
        }).join('');
    }

    function renderDiscover() {
        const grid = document.getElementById('discover-grid');
        if (!grid) return;
        const items = [
            { id: 'shop', icon:'fa-store', label:'商城', color:'#ff6b6b' },
            { id: 'moyu', icon:'fa-fish', label:'摸鱼小记', color:'#4d96ff' },
            { id: 'diary', icon:'fa-clipboard-list', label:'朝夕心记', color:'#6bcb77' },
            { id: 'fortune', icon:'fa-star-and-crescent', label:'运势占卜', color:'#a29bfe' },
            { id: 'mood', icon:'fa-calendar-day', label:'心晴手帐', color:'#fd79a8' },
            { id: 'calendar', icon:'fa-calendar-alt', label:'日历', color:'#fdcb6e' },
            { id: 'decide', icon:'fa-balance-scale', label:'抉择', color:'#e17055' },
            { id: 'stats', icon:'fa-chart-bar', label:'消息统计', color:'#00b894' },
            { id: 'accounting', icon:'fa-coins', label:'同心记账', color:'#f39c12' },
            { id: 'pet', icon:'fa-paw', label:'萌宠屋', color:'#e84393' },
            { id: 'taphone', icon:'fa-mobile-alt', label:'TA的手机', color:'#6c5ce7' },
            { id: 'map', icon:'fa-map-marked-alt', label:'Zmilk地图', color:'#0984e3' },
            { id: 'moments', icon:'fa-images', label:'朋友圈', color:'#00cec9' },
            { id: 'gift', icon:'fa-gift', label:'礼物柜', color:'#fd79a8' },
        ];
        grid.innerHTML = items.map(item => `
            <div class="discover-item" onclick="window.openDiscover('${item.id}')">
                <div class="di-icon" style="background:${item.color}22;color:${item.color};"><i class="fas ${item.icon}"></i></div>
                <div class="di-label">${item.label}</div>
            </div>
        `).join('');
    }

    function renderSettings() {
        const container = document.getElementById('settings-list-container');
        if (!container) return;
        const groups = [
            { title:'通用', items:[
                { id:'theme-toggle', icon:'fa-palette', label:'主题配色', desc:'切换亮色/暗色' },
                { id:'chat-settings', icon:'fa-sliders-h', label:'聊天设置', desc:'回复速度、气泡样式' },
                { id:'sound-settings', icon:'fa-volume-up', label:'音效设置', desc:'消息提示音' },
            ]},
            { title:'数据', items:[
                { id:'data-manage', icon:'fa-database', label:'数据管理', desc:'备份、导入、重置' },
                { id:'export-data', icon:'fa-file-export', label:'导出数据', desc:'导出聊天记录' },
            ]},
            { title:'关于', items:[
                { id:'disclaimer', icon:'fa-scroll', label:'声明与致谢', desc:'开源声明、致谢名单' },
                { id:'tutorial', icon:'fa-compass', label:'新手引导', desc:'重新播放教程' },
            ]}
        ];
        container.innerHTML = groups.map(g => `
            <div class="settings-group"><div class="settings-group-title">${g.title}</div>
            ${g.items.map(item => `
                <div class="settings-item-row" data-id="${item.id}">
                    <div class="si-icon"><i class="fas ${item.icon}"></i></div>
                    <div class="si-info"><div class="si-label">${item.label}</div><div class="si-desc">${item.desc}</div></div>
                    <div class="si-arrow"><i class="fas fa-chevron-right"></i></div>
                </div>
            `).join('')}</div>
        `).join('');
        container.querySelectorAll('.settings-item-row').forEach(el => {
            el.addEventListener('click', () => window.handleSettingsClick(el.dataset.id));
        });
    }

    // ===== Tab切换 =====
    function switchTab(tab) {
        document.querySelectorAll('.app-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
        const pageMap = { chats:'page-chats', contacts:'page-contacts', discover:'page-discover', settings:'page-settings' };
        const page = document.getElementById(pageMap[tab]);
        if (page) page.classList.add('active');
        const titleMap = { chats:'传讯', contacts:'通讯录', discover:'发现', settings:'设置' };
        document.getElementById('nav-title').textContent = titleMap[tab] || '传讯';
        document.getElementById('chat-view-overlay').classList.remove('active');
        if (tab === 'chats') renderChatList();
        if (tab === 'contacts') renderContacts();
        if (tab === 'discover') renderDiscover();
        if (tab === 'settings') renderSettings();
    }

    // ===== 打开聊天 =====
    window.openChatSession = function(sessionId) {
        const session = chatSessions.find(s => s.id === sessionId);
        if (!session) return;
        currentChatId = sessionId;
        const overlay = document.getElementById('chat-view-overlay');
        const avatarEl = document.getElementById('cvh-avatar');
        const nameEl = document.getElementById('cvh-name');
        const statusEl = document.getElementById('cvh-status');
        const initial = (session.name || '?')[0];
        avatarEl.innerHTML = session.avatar ? `<img src="${session.avatar}">` : `<span>${initial}</span>`;
        nameEl.textContent = session.name;
        statusEl.textContent = session.type === 'group' ? '群聊 · 3人' : '在线';
        overlay.classList.add('active');
        session.unread = 0;
        saveSessions();
        renderChatList();
        // 绑定聊天容器到 core.js
        if (typeof window.DOMElements !== 'undefined' && DOMElements) {
            DOMElements.chatContainer = document.getElementById('chat-container');
        }
        // 渲染消息
        if (typeof window.renderMessages === 'function') {
            window.renderMessages(false);
        }
        setTimeout(() => {
            const container = document.getElementById('chat-container');
            if (container) container.scrollTop = container.scrollHeight;
            document.getElementById('message-input')?.focus();
        }, 200);
    };

    // ===== 返回 =====
    document.getElementById('chat-view-back').addEventListener('click', function() {
        document.getElementById('chat-view-overlay').classList.remove('active');
        renderChatList();
    });

    // ===== 新建会话 =====
    document.getElementById('nav-add-btn').addEventListener('click', function() {
        document.getElementById('new-chat-overlay').classList.add('active');
        document.getElementById('new-chat-name').value = '';
        document.getElementById('new-chat-partner').value = '';
        document.getElementById('new-chat-name').focus();
    });
    document.getElementById('new-chat-cancel').addEventListener('click', function() {
        document.getElementById('new-chat-overlay').classList.remove('active');
    });
    document.getElementById('new-chat-confirm').addEventListener('click', function() {
        const name = document.getElementById('new-chat-name').value.trim();
        const partner = document.getElementById('new-chat-partner').value.trim();
        if (!name || !partner) { alert('请完整填写信息'); return; }
        const type = document.getElementById('new-chat-type').value;
        const newSession = {
            id: 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2,4),
            name: name,
            partnerName: partner,
            type: type,
            createdAt: Date.now(),
            avatar: '',
            lastMsg: '开始聊天吧~',
            unread: 0
        };
        chatSessions.push(newSession);
        saveSessions();
        document.getElementById('new-chat-overlay').classList.remove('active');
        renderChatList();
        renderContacts();
        setTimeout(() => window.openChatSession(newSession.id), 200);
    });
    document.getElementById('new-chat-overlay').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
    });

    // ===== 编辑联系人 =====
    window.editContact = function(sessionId) {
        const session = chatSessions.find(s => s.id === sessionId);
        if (!session) return;
        const newName = prompt('修改会话名称：', session.name);
        if (newName !== null && newName.trim()) {
            session.name = newName.trim();
            saveSessions();
            renderContacts();
            renderChatList();
        }
        const newPartner = prompt('修改对方昵称：', session.partnerName || '');
        if (newPartner !== null) {
            session.partnerName = newPartner.trim() || '对方';
            saveSessions();
            renderContacts();
        }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                session.avatar = ev.target.result;
                saveSessions();
                renderContacts();
                renderChatList();
                if (currentChatId === session.id) {
                    document.getElementById('cvh-avatar').innerHTML = `<img src="${session.avatar}">`;
                }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    // ===== 发现功能（直接调用全局函数） =====
    window.openDiscover = function(id) {
        // 等待所有 js 加载完成
        const tryOpen = function() {
            const map = {
                'shop': () => { if (window.ShopApp && window.ShopApp.showShop) window.ShopApp.showShop(); else console.warn('ShopApp 未加载'); },
                'moyu': () => { if (window.openMoyuModal) window.openMoyuModal(); else console.warn('openMoyuModal 未加载'); },
                'diary': () => { if (window.openDiaryModal) window.openDiaryModal(); else console.warn('openDiaryModal 未加载'); },
                'fortune': () => { if (window.generateFortune) window.generateFortune(); else console.warn('generateFortune 未加载'); },
                'mood': () => { const m=document.getElementById('mood-modal'); if(m && window.showModal) window.showModal(m); else console.warn('showModal 未加载'); },
                'calendar': () => { if (window.openMiniCalendar) window.openMiniCalendar(); else console.warn('openMiniCalendar 未加载'); },
                'decide': () => { const m=document.getElementById('decision-menu-modal'); if(m && window.showModal) window.showModal(m); else console.warn('showModal 未加载'); },
                'stats': () => { const m=document.getElementById('stats-modal'); if(m && window.showModal) window.showModal(m); else console.warn('showModal 未加载'); },
                'accounting': () => { if (window.openAccountingModal) window.openAccountingModal(); else console.warn('openAccountingModal 未加载'); },
                'pet': () => { if (window.showPetPage) window.showPetPage(); else console.warn('showPetPage 未加载'); },
                'taphone': () => { if (window.TaPhoneApp && window.TaPhoneApp.showTaPhone) window.TaPhoneApp.showTaPhone(); else console.warn('TaPhoneApp 未加载'); },
                'map': () => { if (window.MapApp && window.MapApp.show) window.MapApp.show(); else console.warn('MapApp 未加载'); },
                'moments': () => { if (window.showMomentsPage) window.showMomentsPage(); else console.warn('showMomentsPage 未加载'); },
                'gift': () => { if (window.GiftCabinetApp && window.GiftCabinetApp.open) window.GiftCabinetApp.open(); else console.warn('GiftCabinetApp 未加载'); },
            };
            if (map[id]) map[id]();
            else alert('功能开发中...');
        };
        // 延迟执行，确保 js 已加载
        setTimeout(tryOpen, 100);
    };

    // ===== 设置点击 =====
    window.handleSettingsClick = function(id) {
        const map = {
            'theme-toggle': () => { const m=document.getElementById('appearance-modal'); if(m && window.showModal) window.showModal(m); },
            'chat-settings': () => { const m=document.getElementById('chat-modal'); if(m && window.showModal) window.showModal(m); },
            'sound-settings': () => { const m=document.getElementById('chat-modal'); if(m && window.showModal) { window.showModal(m); setTimeout(()=>{ document.querySelector('.cs-tab[data-panel="cs-panel-sound"]')?.click(); },100); } },
            'data-manage': () => { const m=document.getElementById('data-modal'); if(m && window.showModal) window.showModal(m); },
            'export-data': () => { if (window.exportChatHistory) window.exportChatHistory(); },
            'disclaimer': () => { const m=document.getElementById('disclaimer-modal'); if(m && window.showModal) window.showModal(m); },
            'tutorial': () => { if (window.startTour) window.startTour(); },
        };
        if (map[id]) map[id]();
        else alert('设置功能开发中...');
    };

    // ===== Tab点击 =====
    document.querySelectorAll('.app-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            switchTab(this.dataset.tab);
        });
    });

    // ===== 时间更新 =====
    function updateTime() {
        const now = new Date();
        document.getElementById('status-time').textContent =
            String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }
    setInterval(updateTime, 10000);
    updateTime();

    // ===== 拦截原 addMessage 更新会话列表 =====
    const origAddMessage = window.addMessage;
    if (origAddMessage) {
        window.addMessage = function(msg) {
            origAddMessage(msg);
            if (msg.sender && msg.sender !== 'system' && currentChatId) {
                const session = chatSessions.find(s => s.id === currentChatId);
                if (session) {
                    session.lastMsg = msg.text || '[图片]';
                    session.unread = (session.unread || 0) + 1;
                    saveSessions();
                    renderChatList();
                }
            }
        };
    }

    // ===== 初始化 =====
    function init() {
        loadSessions();
        renderChatList();
        renderContacts();
        renderDiscover();
        renderSettings();
        switchTab('chats');
        // 延迟绑定聊天容器
        setTimeout(function() {
            if (typeof window.DOMElements !== 'undefined' && DOMElements) {
                DOMElements.chatContainer = document.getElementById('chat-container');
            }
            if (typeof window.messages !== 'undefined' && window.messages.length > 0) {
                if (typeof window.renderMessages === 'function') {
                    window.renderMessages(false);
                }
            }
        }, 500);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

    // 暴露全局
    window.switchTab = switchTab;
    window.renderChatList = renderChatList;
    window.renderContacts = renderContacts;
    window.renderDiscover = renderDiscover;
    window.renderSettings = renderSettings;
    window.chatSessions = chatSessions;
    window.saveSessions = saveSessions;
})();
</script>

<script>
(function() {
    'use strict';

    // ===== 1. 隐藏原始页面中与新布局冲突的元素 =====
    function hideOriginalElements() {
        // 隐藏原有的 header、聊天区域、输入区、主页等
        const selectors = [
            '.header',
            '.main-chat-area',
            '.input-area-wrapper',
            '#home-container',
            '#welcome-animation',
            '.header-motto'
        ];
        selectors.forEach(sel => {
            document.querySelectorAll(sel).forEach(el => {
                if (el) el.style.display = 'none';
            });
        });
        // 但保留所有 modal（它们由 showModal 控制显示）
        // 确保 body 可以滚动
        document.body.style.overflow = 'hidden';
        document.body.style.height = '100vh';
    }

    // ===== 2. 会话数据 =====
    let chatSessions = [];
    let currentChatId = null;

    function loadSessions() {
        try {
            // 尝试从原有 sessionList 读取
            if (typeof window.sessionList !== 'undefined' && window.sessionList && window.sessionList.length > 0) {
                chatSessions = window.sessionList.map(s => ({
                    id: s.id,
                    name: s.name || '会话',
                    partnerName: s.partnerName || '对方',
                    type: 'single',
                    createdAt: s.createdAt || Date.now(),
                    avatar: s.avatar || '',
                    lastMsg: '点击进入聊天',
                    unread: 0
                }));
            } else {
                // 从 localStorage 读取
                const raw = localStorage.getItem('wechat_sessions_cover');
                if (raw) {
                    chatSessions = JSON.parse(raw);
                } else {
                    // 默认
                    let defaultName = '梦角';
                    try {
                        if (typeof settings !== 'undefined' && settings.partnerName) {
                            defaultName = settings.partnerName;
                        }
                    } catch(e) {}
                    chatSessions = [{
                        id: 'default_' + Date.now(),
                        name: defaultName,
                        partnerName: defaultName,
                        type: 'single',
                        createdAt: Date.now(),
                        avatar: '',
                        lastMsg: '你好呀~',
                        unread: 0
                    }];
                }
            }
            saveSessions();
        } catch(e) {
            chatSessions = [{
                id: 'default_' + Date.now(),
                name: '梦角',
                partnerName: '梦角',
                type: 'single',
                createdAt: Date.now(),
                avatar: '',
                lastMsg: '你好呀~',
                unread: 0
            }];
        }
    }

    function saveSessions() {
        try {
            localStorage.setItem('wechat_sessions_cover', JSON.stringify(chatSessions));
        } catch(e) {}
    }

    // ===== 3. 渲染函数 =====

    // 渲染会话列表
    function renderChatList() {
        const container = document.getElementById('wc-chat-list');
        if (!container) return;
        if (!chatSessions || chatSessions.length === 0) {
            container.innerHTML = '<div class="wc-empty"><i class="fas fa-comment-dots"></i><p>暂无会话</p><span style="font-size:12px;opacity:0.6;">点击右上角 + 创建</span></div>';
            return;
        }
        const sorted = [...chatSessions].sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
        container.innerHTML = sorted.map(s => {
            const avatar = s.avatar || '';
            const initial = (s.name || '?')[0];
            const unread = s.unread || 0;
            const lastMsg = s.lastMsg || '开始聊天~';
            const time = new Date(s.createdAt || Date.now()).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
            return `
                <div class="wc-chat-item" data-id="${s.id}" onclick="window.openOriginalChat('${s.id}')">
                    <div class="avatar">${avatar ? `<img src="${avatar}">` : `<span>${initial}</span>`}</div>
                    <div class="info"><div class="name">${s.name}</div><div class="preview">${lastMsg}</div></div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                        <div class="time">${time}</div>
                        ${unread > 0 ? `<div class="badge">${unread > 99 ? '99+' : unread}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    // 渲染通讯录
    function renderContacts() {
        const container = document.getElementById('wc-contact-list');
        if (!container) return;
        if (!chatSessions || chatSessions.length === 0) {
            container.innerHTML = '<div class="wc-empty"><i class="fas fa-address-book"></i><p>通讯录为空</p></div>';
            return;
        }
        container.innerHTML = chatSessions.map(s => {
            const avatar = s.avatar || '';
            const initial = (s.name || '?')[0];
            return `
                <div class="wc-contact-item">
                    <div class="avatar">${avatar ? `<img src="${avatar}">` : `<span>${initial}</span>`}</div>
                    <div class="info"><div class="name">${s.name}</div><div class="desc">${s.type === 'group' ? '群聊' : '单人'} · ${s.partnerName || ''}</div></div>
                    <button class="edit-btn" onclick="window.editContactCover('${s.id}')"><i class="fas fa-pen"></i></button>
                </div>
            `;
        }).join('');
    }

    // 渲染发现
    function renderDiscover() {
        const grid = document.getElementById('wc-discover-grid');
        if (!grid) return;
        const items = [
            { id: 'shop', icon:'fa-store', label:'商城', color:'#ff6b6b' },
            { id: 'moyu', icon:'fa-fish', label:'摸鱼小记', color:'#4d96ff' },
            { id: 'diary', icon:'fa-clipboard-list', label:'朝夕心记', color:'#6bcb77' },
            { id: 'fortune', icon:'fa-star-and-crescent', label:'运势占卜', color:'#a29bfe' },
            { id: 'mood', icon:'fa-calendar-day', label:'心晴手帐', color:'#fd79a8' },
            { id: 'calendar', icon:'fa-calendar-alt', label:'日历', color:'#fdcb6e' },
            { id: 'decide', icon:'fa-balance-scale', label:'抉择', color:'#e17055' },
            { id: 'stats', icon:'fa-chart-bar', label:'消息统计', color:'#00b894' },
            { id: 'accounting', icon:'fa-coins', label:'同心记账', color:'#f39c12' },
            { id: 'pet', icon:'fa-paw', label:'萌宠屋', color:'#e84393' },
            { id: 'taphone', icon:'fa-mobile-alt', label:'TA的手机', color:'#6c5ce7' },
            { id: 'map', icon:'fa-map-marked-alt', label:'Zmilk地图', color:'#0984e3' },
            { id: 'moments', icon:'fa-images', label:'朋友圈', color:'#00cec9' },
            { id: 'gift', icon:'fa-gift', label:'礼物柜', color:'#fd79a8' },
        ];
        grid.innerHTML = items.map(item => `
            <div class="wc-discover-item" onclick="window.openDiscoverCover('${item.id}')">
                <div class="icon" style="background:${item.color}22;color:${item.color};"><i class="fas ${item.icon}"></i></div>
                <div class="label">${item.label}</div>
            </div>
        `).join('');
    }

    // 渲染设置
    function renderSettings() {
        const container = document.getElementById('wc-settings-list');
        if (!container) return;
        const groups = [
            { title:'通用', items:[
                { id:'theme', icon:'fa-palette', label:'主题配色', desc:'切换亮色/暗色' },
                { id:'chat', icon:'fa-sliders-h', label:'聊天设置', desc:'回复速度、气泡样式' },
                { id:'sound', icon:'fa-volume-up', label:'音效设置', desc:'消息提示音' },
            ]},
            { title:'数据', items:[
                { id:'data', icon:'fa-database', label:'数据管理', desc:'备份、导入、重置' },
                { id:'export', icon:'fa-file-export', label:'导出数据', desc:'导出聊天记录' },
            ]},
            { title:'关于', items:[
                { id:'disclaimer', icon:'fa-scroll', label:'声明与致谢', desc:'开源声明、致谢名单' },
                { id:'tutorial', icon:'fa-compass', label:'新手引导', desc:'重新播放教程' },
            ]}
        ];
        container.innerHTML = groups.map(g => `
            <div class="wc-settings-group"><div class="wc-settings-group-title">${g.title}</div>
            ${g.items.map(item => `
                <div class="wc-settings-item" data-id="${item.id}">
                    <div class="icon"><i class="fas ${item.icon}"></i></div>
                    <div class="info"><div class="label">${item.label}</div><div class="desc">${item.desc}</div></div>
                    <div class="arrow"><i class="fas fa-chevron-right"></i></div>
                </div>
            `).join('')}</div>
        `).join('');
        container.querySelectorAll('.wc-settings-item').forEach(el => {
            el.addEventListener('click', () => window.handleSettingsCover(el.dataset.id));
        });
    }

    // ===== 4. Tab切换 =====
    function switchTab(tab) {
        document.querySelectorAll('.wc-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.querySelectorAll('.wc-page').forEach(p => p.classList.remove('active'));
        const pageMap = { chats:'wc-page-chats', contacts:'wc-page-contacts', discover:'wc-page-discover', settings:'wc-page-settings' };
        const page = document.getElementById(pageMap[tab]);
        if (page) page.classList.add('active');
        const titleMap = { chats:'传讯', contacts:'通讯录', discover:'发现', settings:'设置' };
        document.getElementById('wc-nav-title').textContent = titleMap[tab] || '传讯';
        // 刷新对应页面
        if (tab === 'chats') renderChatList();
        if (tab === 'contacts') renderContacts();
        if (tab === 'discover') renderDiscover();
        if (tab === 'settings') renderSettings();
    }

    // ===== 5. 打开原始聊天界面 =====
    window.openOriginalChat = function(sessionId) {
        const session = chatSessions.find(s => s.id === sessionId);
        if (!session) return;
        currentChatId = sessionId;
        session.unread = 0;
        saveSessions();
        renderChatList();

        // 1. 显示原始聊天区域
        const chatArea = document.querySelector('.main-chat-area');
        const inputArea = document.querySelector('.input-area-wrapper');
        if (chatArea) chatArea.style.display = 'flex';
        if (inputArea) inputArea.style.display = 'block';

        // 2. 隐藏覆盖层
        document.getElementById('wechat-overlay').style.display = 'none';

        // 3. 让 body 恢复正常滚动
        document.body.style.overflow = '';
        document.body.style.height = '';

        // 4. 触发原有渲染
        if (typeof window.renderMessages === 'function') {
            // 确保 DOMElements 指向正确的容器
            if (typeof window.DOMElements !== 'undefined' && DOMElements) {
                DOMElements.chatContainer = document.getElementById('chat-container');
            }
            window.renderMessages(false);
        }

        // 5. 滚动到底部
        setTimeout(() => {
            const container = document.getElementById('chat-container');
            if (container) container.scrollTop = container.scrollHeight;
            const input = document.getElementById('message-input');
            if (input) input.focus();
        }, 300);
    };

    // ===== 6. 返回覆盖层 =====
    function showOverlay() {
        // 隐藏原始聊天区域
        const chatArea = document.querySelector('.main-chat-area');
        const inputArea = document.querySelector('.input-area-wrapper');
        if (chatArea) chatArea.style.display = 'none';
        if (inputArea) inputArea.style.display = 'none';

        // 显示覆盖层
        document.getElementById('wechat-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        document.body.style.height = '100vh';

        // 刷新列表
        renderChatList();
        renderContacts();

        // 如果当前在传讯页，刷新
        const activeTab = document.querySelector('.wc-tab.active');
        if (activeTab) switchTab(activeTab.dataset.tab);
    }

    // ===== 7. 监听返回（通过原始页面的返回按钮） =====
    // 在覆盖层显示时，如果用户通过原始页面的返回按钮回到主页，
    // 我们需要重新显示覆盖层。
    // 但由于原始页面结构复杂，我们通过 MutationObserver 检测 chat-container 的显示状态
    // 更简单：在覆盖层显示时，拦截原有的返回行为

    // 但更好的方式：当覆盖层隐藏时，监听 body 上的点击，如果点击了原始页面的返回按钮，
    // 但我们无法轻易修改原始代码。所以提供一个手动返回按钮：
    // 在原始聊天界面添加一个悬浮返回按钮

    // 在覆盖层隐藏时，给原始聊天区域添加一个返回按钮
    function addBackButtonToOriginalChat() {
        // 检查是否已经添加
        if (document.getElementById('wc-float-back-btn')) return;

        const btn = document.createElement('button');
        btn.id = 'wc-float-back-btn';
        btn.innerHTML = '<i class="fas fa-arrow-left"></i>';
        btn.style.cssText = `
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 999999;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 18px;
            color: var(--text-primary, #1a1a1a);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        `;
        btn.onmouseenter = function() { this.style.transform = 'scale(1.05)'; };
        btn.onmouseleave = function() { this.style.transform = 'scale(1)'; };
        btn.onclick = function() {
            // 隐藏原始聊天，显示覆盖层
            showOverlay();
            // 如果原始页面有返回逻辑，也调用一下
            if (typeof window.hideHomePage === 'function') {
                // 但不执行 hideHomePage，它可能会隐藏错误的东西
            }
        };
        document.body.appendChild(btn);

        // 监听覆盖层显示状态
        const overlay = document.getElementById('wechat-overlay');
        const observer = new MutationObserver(function() {
            const isHidden = overlay.style.display === 'none';
            btn.style.display = isHidden ? 'flex' : 'none';
        });
        observer.observe(overlay, { attributes: true, attributeFilter: ['style'] });

        // 初始状态
        btn.style.display = 'none';
    }

    // ===== 8. 新建会话 =====
    function showNewChatDialog() {
        const name = prompt('请输入会话名称：');
        if (!name || !name.trim()) return;
        const partner = prompt('请输入对方昵称：');
        if (!partner || !partner.trim()) return;
        const type = confirm('是否创建群聊？点击「确定」为群聊，「取消」为单人') ? 'group' : 'single';
        const newSession = {
            id: 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2,4),
            name: name.trim(),
            partnerName: partner.trim(),
            type: type,
            createdAt: Date.now(),
            avatar: '',
            lastMsg: '开始聊天吧~',
            unread: 0
        };
        chatSessions.push(newSession);
        saveSessions();
        renderChatList();
        renderContacts();
        // 自动打开
        setTimeout(() => window.openOriginalChat(newSession.id), 200);
    }

    // ===== 9. 编辑联系人 =====
    window.editContactCover = function(sessionId) {
        const session = chatSessions.find(s => s.id === sessionId);
        if (!session) return;
        const newName = prompt('修改会话名称：', session.name);
        if (newName !== null && newName.trim()) {
            session.name = newName.trim();
            saveSessions();
            renderContacts();
            renderChatList();
        }
        const newPartner = prompt('修改对方昵称：', session.partnerName || '');
        if (newPartner !== null) {
            session.partnerName = newPartner.trim() || '对方';
            saveSessions();
            renderContacts();
        }
        // 头像上传
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                session.avatar = ev.target.result;
                saveSessions();
                renderContacts();
                renderChatList();
                if (currentChatId === session.id) {
                    // 更新聊天视图头像（如果有）
                }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    // ===== 10. 发现功能 =====
    window.openDiscoverCover = function(id) {
        // 延迟执行，确保所有 JS 已加载
        const tryOpen = function() {
            const map = {
                'shop': () => { if (window.ShopApp && window.ShopApp.showShop) window.ShopApp.showShop(); else console.warn('ShopApp 未加载'); },
                'moyu': () => { if (window.openMoyuModal) window.openMoyuModal(); else console.warn('openMoyuModal 未加载'); },
                'diary': () => { if (window.openDiaryModal) window.openDiaryModal(); else console.warn('openDiaryModal 未加载'); },
                'fortune': () => { if (window.generateFortune) window.generateFortune(); else console.warn('generateFortune 未加载'); },
                'mood': () => { const m=document.getElementById('mood-modal'); if(m && window.showModal) window.showModal(m); else console.warn('showModal 未加载'); },
                'calendar': () => { if (window.openMiniCalendar) window.openMiniCalendar(); else console.warn('openMiniCalendar 未加载'); },
                'decide': () => { const m=document.getElementById('decision-menu-modal'); if(m && window.showModal) window.showModal(m); else console.warn('showModal 未加载'); },
                'stats': () => { const m=document.getElementById('stats-modal'); if(m && window.showModal) window.showModal(m); else console.warn('showModal 未加载'); },
                'accounting': () => { if (window.openAccountingModal) window.openAccountingModal(); else console.warn('openAccountingModal 未加载'); },
                'pet': () => { if (window.showPetPage) window.showPetPage(); else console.warn('showPetPage 未加载'); },
                'taphone': () => { if (window.TaPhoneApp && window.TaPhoneApp.showTaPhone) window.TaPhoneApp.showTaPhone(); else console.warn('TaPhoneApp 未加载'); },
                'map': () => { if (window.MapApp && window.MapApp.show) window.MapApp.show(); else console.warn('MapApp 未加载'); },
                'moments': () => { if (window.showMomentsPage) window.showMomentsPage(); else console.warn('showMomentsPage 未加载'); },
                'gift': () => { if (window.GiftCabinetApp && window.GiftCabinetApp.open) window.GiftCabinetApp.open(); else console.warn('GiftCabinetApp 未加载'); },
            };
            if (map[id]) map[id]();
            else alert('功能开发中...');
        };
        setTimeout(tryOpen, 150);
    };

    // ===== 11. 设置功能 =====
    window.handleSettingsCover = function(id) {
        const map = {
            'theme': () => { const m=document.getElementById('appearance-modal'); if(m && window.showModal) window.showModal(m); },
            'chat': () => { const m=document.getElementById('chat-modal'); if(m && window.showModal) window.showModal(m); },
            'sound': () => { const m=document.getElementById('chat-modal'); if(m && window.showModal) { window.showModal(m); setTimeout(()=>{ document.querySelector('.cs-tab[data-panel="cs-panel-sound"]')?.click(); },100); } },
            'data': () => { const m=document.getElementById('data-modal'); if(m && window.showModal) window.showModal(m); },
            'export': () => { if (window.exportChatHistory) window.exportChatHistory(); },
            'disclaimer': () => { const m=document.getElementById('disclaimer-modal'); if(m && window.showModal) window.showModal(m); },
            'tutorial': () => { if (window.startTour) window.startTour(); },
        };
        if (map[id]) map[id]();
        else alert('设置功能开发中...');
    };

    // ===== 12. 事件绑定 =====
    document.querySelectorAll('.wc-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            switchTab(this.dataset.tab);
        });
    });

    document.getElementById('wc-nav-add').addEventListener('click', showNewChatDialog);

    // ===== 13. 状态时间 =====
    function updateTime() {
        const now = new Date();
        document.getElementById('wc-status-time').textContent =
            String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }
    setInterval(updateTime, 10000);
    updateTime();

    // ===== 14. 初始化 =====
    function init() {
        // 隐藏原始元素
        hideOriginalElements();

        // 加载会话
        loadSessions();

        // 渲染
        renderChatList();
        renderContacts();
        renderDiscover();
        renderSettings();

        // 默认选中传讯
        switchTab('chats');

        // 添加浮动返回按钮
        addBackButtonToOriginalChat();

        // 确保覆盖层可见
        document.getElementById('wechat-overlay').style.display = 'flex';

        // 监听原有消息添加，更新会话列表
        const origAdd = window.addMessage;
        if (origAdd) {
            window.addMessage = function(msg) {
                origAdd(msg);
                if (msg.sender && msg.sender !== 'system' && currentChatId) {
                    const session = chatSessions.find(s => s.id === currentChatId);
                    if (session) {
                        session.lastMsg = msg.text || '[图片]';
                        session.unread = (session.unread || 0) + 1;
                        saveSessions();
                        if (document.getElementById('wechat-overlay').style.display !== 'none') {
                            renderChatList();
                        }
                    }
                }
            };
        }

        console.log('[覆盖层] 初始化完成！点击「传讯」中的会话可进入聊天，点击返回按钮回到覆盖层。');
    }

    // 执行
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

    // 暴露给外部
    window.showOverlay = showOverlay;
    window.switchTabCover = switchTab;
    window.renderChatListCover = renderChatList;
    window.renderContactsCover = renderContacts;
    window.renderDiscoverCover = renderDiscover;
    window.renderSettingsCover = renderSettings;
    window.chatSessionsCover = chatSessions;
    window.saveSessionsCover = saveSessions;
})();
</script>
</body>
</html>
